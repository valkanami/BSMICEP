<!-- Botón de acción principal -->
<div class="pdf-action-header">
  <h2>Generador de Reportes PDF</h2>
  <p>Genera un documento PDF que contiene todas las gráficas e indicadores del sistema.</p>

  <button class="btn-generate" (click)="generatePDF()" [disabled]="isGeneratingResult">
    <i class="pi pi-file-pdf" *ngIf="!isGeneratingResult"></i>
    <i class="pi pi-spin pi-spinner" *ngIf="isGeneratingResult"></i>
    {{ isGeneratingResult ? 'Generando...' : 'Descargar PDF Completo' }}
  </button>

  <div class="progress-message" *ngIf="progressMessage">
    {{ progressMessage }}
  </div>
</div>

<!-- Overlay que bloquea la vista durante la generación -->
<div class="pdf-overlay" *ngIf="isGeneratingResult">
  <div class="pdf-overlay-content">
    <i class="pi pi-spin pi-spinner" style="font-size: 3rem; color: #10b981;"></i>
    <h3>Generando PDF...</h3>
    <p>{{ progressMessage }}</p>
  </div>
</div>
